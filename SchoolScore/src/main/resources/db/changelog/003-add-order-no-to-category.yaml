databaseChangeLog:

  # 1️ 加欄位（結構變更）
  - changeSet:
      id: 003-add-order-no-to-category
      author: you
      changes:
        - addColumn:
            tableName: category
            columns:
              - column:
                  name: order_no
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  # 2️ 國文
  - changeSet:
      id: init-category-order-1
      author: you
      changes:
        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 10 }
            where: name = '習作' AND subject_id = 1

        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 20 }
            where: name = '圈詞' AND subject_id = 1

        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 30 }
            where: name = '甲本' AND subject_id = 1

        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 40 }
            where: name = '乙本' AND subject_id = 1

        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 50 }
            where: name = '作文' AND subject_id = 1

        - update:
            tableName: category
            columns:
              - column: { name: order_no, valueNumeric: 60 }
            where: name = '測驗' AND subject_id = 1

