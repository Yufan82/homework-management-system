
databaseChangeLog:
- changeSet:
    id: 004-fix-category-order
    author: you
    preConditions:
      - onFail: MARK_RAN
      - sqlCheck:
          expectedResult: 0
          sql: SELECT COUNT(*) FROM category WHERE name = '回條' AND subject_id = 6 AND order_no = 30

    changes:
      - update:
          tableName: category
          columns:
            - column:
                name: order_no
                valueNumeric: 30
          where: name = '回條' AND subject_id = 6