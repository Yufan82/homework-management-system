<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Student No</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/studentNo.css">
</head>
<body>

<!-- 導覽列 -->
<nav class="navbar navbar-light bg-light-blue">
    <div class="container-fluid">
        <span class="navbar-brand">學生作業管理系統</span>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="row">

        <!-- 左側 -->
        <div class="col-md-3 seat-panel p-3">
            <h5>座號</h5>
            <div id="seatContainer" class="d-flex flex-wrap"></div>
        </div>

        <!-- 右側 -->
        <div class="col-md-9 content-panel p-3">
            <h4 class="text-center">未交項目</h4>
            <div id="resultArea"></div>
        </div>

    </div>
</div>

<!--  Modal 確認視窗 -->
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">確認操作</h5>
            </div>

            <div class="modal-body" id="modalText">
                確定要標記為已繳交嗎？
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" id="confirmBtn">確定</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/studentNo.js"></script>

</body>
</html>
